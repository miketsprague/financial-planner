name: PR Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshot:
    name: Capture & Post Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Build static site
        run: npm run build
        env:
          PAGES_BASE_PATH: ""

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: npx playwright test --config=playwright.config.ts

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: screenshots/
          retention-days: 7

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const screenshotsDir = 'screenshots';
            if (!fs.existsSync(screenshotsDir)) return;

            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `## 📸 PR Screenshots\n\n`;
            body += `Captured ${files.length} screenshot(s) for this PR.\n\n`;
            body += `👉 **[Download screenshots](${runUrl}#artifacts)** from the workflow artifacts to view.\n\n`;
            body += `| Page | Status |\n|------|--------|\n`;
            for (const file of files) {
              const name = file.replace('.png', '');
              body += `| ${name} | ✅ captured |\n`;
            }
            body += `\n<sub>🤖 Auto-generated by PR Screenshots workflow</sub>`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('📸 PR Screenshots')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (prev) {
              await github.rest.issues.updateComment({ ...params, comment_id: prev.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
