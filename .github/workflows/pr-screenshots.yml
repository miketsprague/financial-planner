name: PR Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshot:
    name: Capture & Post Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm install

      - name: Build static site
        run: npm run build
        env:
          PAGES_BASE_PATH: ""

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: npx playwright test --config=playwright.config.ts

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: screenshots/
          retention-days: 7

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const screenshotsDir = 'screenshots';
            if (!fs.existsSync(screenshotsDir)) return;

            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            // Commit screenshots to the PR branch so we can reference them inline
            const { execSync } = require('child_process');
            const branch = context.payload.pull_request.head.ref;
            const sha = context.payload.pull_request.head.sha;

            const imageMarkdown = [];
            for (const file of files) {
              const filePath = path.join(screenshotsDir, file);
              const name = file.replace('.png', '');
              const content = fs.readFileSync(filePath, { encoding: 'base64' });
              const repoPath = `.github/screenshots/${file}`;

              try {
                // Use the Contents API to create/update the file on the PR branch
                let existingSha;
                try {
                  const existing = await github.rest.repos.getContent({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    path: repoPath,
                    ref: branch,
                  });
                  existingSha = existing.data.sha;
                } catch { /* file doesn't exist yet */ }

                await github.rest.repos.createOrUpdateFileContents({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  path: repoPath,
                  message: `chore: update PR screenshot [skip ci]`,
                  content,
                  branch,
                  ...(existingSha ? { sha: existingSha } : {}),
                });

                const imgUrl = `https://raw.githubusercontent.com/${context.repo.owner}/${context.repo.repo}/${branch}/${repoPath}`;
                imageMarkdown.push({ name, md: `![${name}](${imgUrl})` });
              } catch (e) {
                console.log(`Failed to commit screenshot ${file}: ${e.message}`);
                imageMarkdown.push({ name, md: `${name}: commit failed` });
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `## 📸 PR Screenshots\n\n`;
            for (const { name, md } of imageMarkdown) {
              body += `### ${name}\n\n${md}\n\n`;
            }
            body += `<details><summary>Download all screenshots</summary>\n\n`;
            body += `[Workflow artifacts](${runUrl}#artifacts)\n</details>\n\n`;
            body += `<sub>🤖 Auto-generated by PR Screenshots workflow</sub>`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('📸 PR Screenshots')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (prev) {
              await github.rest.issues.updateComment({ ...params, comment_id: prev.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
