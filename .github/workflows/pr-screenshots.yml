name: PR Screenshots

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshot:
    name: Capture & Post Screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm install

      - name: Build static site
        run: npm run build
        env:
          PAGES_BASE_PATH: ""

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Capture screenshots
        run: npx playwright test --config=playwright.config.ts

      - name: Upload screenshots as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-screenshots
          path: screenshots/
          retention-days: 7

      - name: Post screenshots to PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const screenshotsDir = 'screenshots';
            if (!fs.existsSync(screenshotsDir)) return;

            const files = fs.readdirSync(screenshotsDir).filter(f => f.endsWith('.png'));
            if (files.length === 0) return;

            // Upload each screenshot to GitHub's CDN via the repo upload endpoint
            const imageMarkdown = [];
            for (const file of files) {
              const filePath = path.join(screenshotsDir, file);
              const name = file.replace('.png', '');

              // Use GitHub's attachment upload API
              const fileContent = fs.readFileSync(filePath);
              const boundary = '----GitHubFormBoundary' + Math.random().toString(36).slice(2);
              const payload = Buffer.concat([
                Buffer.from(`--${boundary}\r\nContent-Disposition: form-data; name="file"; filename="${file}"\r\nContent-Type: image/png\r\n\r\n`),
                fileContent,
                Buffer.from(`\r\n--${boundary}--\r\n`),
              ]);

              try {
                const response = await fetch(
                  `https://uploads.github.com/repos/${context.repo.owner}/${context.repo.repo}/issues/${context.issue.number}/uploads`,
                  {
                    method: 'POST',
                    headers: {
                      'Authorization': `Bearer ${process.env.GITHUB_TOKEN}`,
                      'Content-Type': `multipart/form-data; boundary=${boundary}`,
                      'Accept': 'application/json',
                    },
                    body: payload,
                  }
                );

                if (response.ok) {
                  const data = await response.json();
                  // The response contains the markdown for the uploaded image
                  if (data.href) {
                    imageMarkdown.push({ name, md: `![${name}](${data.href})` });
                  } else if (data.url) {
                    imageMarkdown.push({ name, md: `![${name}](${data.url})` });
                  } else {
                    // Fallback: try to extract from the response
                    imageMarkdown.push({ name, md: `![${name}](${JSON.stringify(data)})` });
                  }
                } else {
                  console.log(`Upload failed for ${file}: ${response.status} ${response.statusText}`);
                  imageMarkdown.push({ name, md: `${name}: upload failed (${response.status})` });
                }
              } catch (e) {
                console.log(`Upload error for ${file}: ${e.message}`);
                // Fallback to artifact link
                const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
                imageMarkdown.push({ name, md: `${name}: [download from artifacts](${runUrl}#artifacts)` });
              }
            }

            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            let body = `## 📸 PR Screenshots\n\n`;
            for (const { name, md } of imageMarkdown) {
              body += `### ${name}\n\n${md}\n\n`;
            }
            body += `<details><summary>Download all screenshots</summary>\n\n`;
            body += `[Workflow artifacts](${runUrl}#artifacts)\n</details>\n\n`;
            body += `<sub>🤖 Auto-generated by PR Screenshots workflow</sub>`;

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const prev = comments.find(c =>
              c.user.type === 'Bot' && c.body?.includes('📸 PR Screenshots')
            );

            const params = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            };

            if (prev) {
              await github.rest.issues.updateComment({ ...params, comment_id: prev.id });
            } else {
              await github.rest.issues.createComment({ ...params, issue_number: context.issue.number });
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
